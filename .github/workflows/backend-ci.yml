name: Backend CI

on:
  push:
    branches:
      - main
      - dev/**
    paths:
      - "app/**"
      - "tests/**"
      - "scripts/**"
      - "requirements.txt"
      - "pytest.ini"
      - "main.py"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "app/**"
      - "tests/**"
      - "scripts/**"
      - "requirements.txt"
      - "pytest.ini"
      - "main.py"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check app/ tests/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=app --cov-report=term-missing --cov-fail-under=70 --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: test-results.xml

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image (verify only)
        run: docker build .
